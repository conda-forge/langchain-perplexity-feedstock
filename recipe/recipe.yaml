context:
  name: langchain-perplexity
  version: "1.2.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/langchain_perplexity-${{ version }}.tar.gz
  sha256: 87a031bbf47bd117ae9f760cf8276ae6c296cf2000147ae97b27a80b9cc92bd8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.3.2,<2.0.0
    - perplexityai >=0.32.0,<1.0.0

tests:
  - python:
      imports:
        - langchain_perplexity
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: An integration package connecting Perplexity and LangChain
  license: MIT
  license_file: LICENSE
  repository: https://github.com/langchain-ai/langchain/tree/master/libs/partners/perplexity
  homepage: https://reference.langchain.com/python/integrations/langchain_perplexity

extra:
  recipe-maintainers:
    - MridulS
